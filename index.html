<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SnapViewer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>">
  <style>
    /* ── Reset & base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f1117;
      --sidebar-bg:  #1a1d27;
      --panel-bg:    #13151f;
      --border:      #2a2d3e;
      --accent:      #7c6af7;
      --accent-soft: #3d3670;
      --text:        #c9cdd8;
      --text-dim:    #6b7080;
      --text-bright: #eef0f6;
      --folder:      #f0b429;
      --file-md:     #56c8d8;
      --file-img:    #78e08f;
      --hover:       #22263a;
      --active:      #2c2f4a;
      --danger:      #e06c75;
      --radius:      8px;
      --sidebar-w:   360px;
      --header-h:    52px;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Layout ───────────────────────────────────────────────────── */
    #app {
      display: grid;
      grid-template-rows: var(--header-h) 1fr;
      grid-template-columns: var(--sidebar-w) 4px 1fr;
      height: 100vh;
    }

    /* ── Header ───────────────────────────────────────────────────── */
    #header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--border);
      user-select: none;
      overflow: visible;
      position: relative;
      z-index: 50;
    }

    #header .logo {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    #header .logo span { color: var(--text-bright); }
    #header .logo #logo-subhead {
      font-size: 0.9rem;
      color: var(--text-dim);
	}

    /* ── Path dropdown ────────────────────────────────────────────── */
    #path-dropdown-wrap {
      margin-left: auto;
      position: relative;
      flex-shrink: 1;
      min-width: 0;
      max-width: 55vw;
    }

    #path-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.78rem;
      cursor: pointer;
      max-width: 100%;
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
      overflow: hidden;
    }
    #path-btn:hover { border-color: var(--accent); background: var(--hover); }
    #path-btn.open  { border-color: var(--accent); background: var(--hover); }

    #path-btn .path-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-dim);
      flex: 1;
      min-width: 0;
      font-size: 0.82rem;
    }
    #path-btn .path-text.has-path { color: var(--text-bright); font-weight: 500; }

    #path-btn .chevron {
      flex-shrink: 0;
      font-size: 0.6rem;
      color: var(--text-dim);
      transition: transform 0.18s;
    }
    #path-btn.open .chevron { transform: rotate(180deg); }

    /* ── Dropdown panel ───────────────────────────────────────────── */
    #path-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      width: 380px;
      max-height: 480px;
      overflow-y: auto;
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      z-index: 200;
      flex-direction: column;
    }
    #path-dropdown.open { display: flex; }
    #path-dropdown::-webkit-scrollbar { width: 5px; }
    #path-dropdown::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .dd-section-label {
      padding: 8px 12px 6px;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .dd-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      border-bottom: 1px solid var(--border);
      transition: background 0.13s;
      flex-shrink: 0;
    }
    .dd-item:last-of-type { border-bottom: none; }
    .dd-item:hover { background: var(--hover); }
    .dd-item.current { background: var(--active); }

    .dd-item-body {
      flex: 1;
      min-width: 0;
      cursor: pointer;
    }

    .dd-item-label {
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--text-bright);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dd-current-badge {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 3px;
      padding: 1px 5px;
      flex-shrink: 0;
    }

    .dd-item-meta {
      font-size: 0.71rem;
      color: var(--text-dim);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Inline label editor */
    .dd-label-input {
      width: 100%;
      padding: 3px 7px;
      border-radius: 4px;
      border: 1px solid var(--accent);
      background: var(--bg);
      color: var(--text-bright);
      font-size: 0.84rem;
      font-weight: 600;
      outline: none;
      margin-bottom: 2px;
    }

    .dd-item-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .dd-icon-btn {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-dim);
      font-size: 0.72rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.13s, color 0.13s, border-color 0.13s;
      flex-shrink: 0;
    }
    .dd-icon-btn:hover {
      background: var(--hover);
      border-color: var(--border);
      color: var(--text-bright);
    }
    .dd-icon-btn.danger:hover {
      background: rgba(224,108,117,0.15);
      border-color: var(--danger);
      color: var(--danger);
    }
    .dd-icon-btn.confirm:hover {
      background: rgba(124,106,247,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }

    .dd-divider { height: 1px; background: var(--border); flex-shrink: 0; }

    .dd-action {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      font-size: 0.81rem;
      color: var(--accent);
      cursor: pointer;
      font-weight: 500;
      transition: background 0.13s;
      flex-shrink: 0;
    }
    .dd-action:hover { background: var(--hover); }

    /* ── Modal overlay (nickname prompt) ──────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 28px 22px;
      width: 380px;
      max-width: 90vw;
      box-shadow: 0 12px 48px rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #modal h3 {
      font-size: 1rem;
      color: var(--text-bright);
      font-weight: 600;
    }
    #modal p {
      font-size: 0.83rem;
      color: var(--text-dim);
      line-height: 1.55;
    }
    #modal-input {
      width: 100%;
      padding: 8px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-bright);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #modal-input:focus { border-color: var(--accent); }

    .modal-hint {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: -8px;
    }

    #modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .modal-btn {
      padding: 7px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.84rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .modal-btn:hover { background: var(--hover); border-color: var(--accent); color: var(--text-bright); }
    .modal-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .modal-btn.primary:hover { background: #6a59e0; }

    /* ── Sidebar ──────────────────────────────────────────────────── */
    #sidebar {
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 160px;
      max-width: 80vw;
    }

    #sidebar-toolbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
    }

    .tb-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 9px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.76rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      user-select: none;
    }
    .tb-btn:hover  { background: var(--hover); border-color: var(--accent); color: var(--text-bright); }
    .tb-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--text-bright); }
    .tb-btn .btn-icon { font-size: 0.85rem; }

    #filter-bar {
      flex-shrink: 0;
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
    }
    #filter-bar.visible { display: flex; }

    #filter-input {
      flex: 1;
      padding: 5px 9px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-bright);
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #filter-input:focus { border-color: var(--accent); }
    #filter-input::placeholder { color: var(--text-dim); }

    #tree-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 6px 0 20px;
    }
    #tree-scroll::-webkit-scrollbar { width: 5px; }
    #tree-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Resize handle ────────────────────────────────────────────── */
    #resizer {
      grid-row: 2;
      grid-column: 2;
      background: var(--border);
      cursor: col-resize;
      transition: background 0.15s;
      z-index: 20;
    }
    #resizer:hover, #resizer.dragging { background: var(--accent); }

    /* ── Tree nodes ───────────────────────────────────────────────── */
    .tree-node { width: 100%; }

    .tree-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px 5px 0;
      cursor: pointer;
      border-radius: 5px;
      transition: background 0.14s;
      white-space: nowrap;
      overflow: hidden;
    }
    .tree-row:hover  { background: var(--hover); }
    .tree-row.active { background: var(--active); }
    .tree-row.active .row-name { color: var(--text-bright); }
    .tree-row.dim-folder .row-name { color: var(--text-dim); }
    .tree-row.dim-folder .row-icon { opacity: 0.45; }

    .row-arrow {
      flex-shrink: 0;
      width: 14px;
      font-size: 0.65rem;
      color: var(--text-dim);
      transition: transform 0.18s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .row-arrow.open { transform: rotate(90deg); }
    .row-arrow.leaf { visibility: hidden; }

    .row-icon { flex-shrink: 0; font-size: 0.95rem; }
    .row-name { font-size: 0.84rem; color: var(--text); overflow: hidden; text-overflow: ellipsis; }

    .tree-children { overflow: hidden; transition: max-height 0.22s ease; }
    .tree-children.collapsed { max-height: 0 !important; }

	/* ── File tooltip ─────────────────────────────────────────────── */
	#file-tooltip {
	  position: fixed;
	  z-index: 999;
	  pointer-events: none;
	  display: none;
	  flex-direction: column;
	  gap: 3px;
	  padding: 8px 11px;
	  background: #1e2235;
	  border: 1px solid var(--border);
	  border-radius: var(--radius);
	  box-shadow: 0 6px 24px rgba(0,0,0,0.55);
	  max-width: 400px;
	}
	#file-tooltip.visible { display: flex; }

	.tt-name {
	  font-size: 0.82rem;
	  font-weight: 600;
	  color: var(--text-bright);
	  word-break: break-all;
	}
	.tt-row {
	  display: flex;
	  align-items: center;
	  gap: 6px;
	  font-size: 0.75rem;
	  color: var(--text-dim);
	}
	.tt-row .tt-icon { font-size: 0.8rem; }
	.tt-row .tt-val  { color: var(--text); }

    /* ── Content ──────────────────────────────────────────────────── */
    #content {
      grid-row: 2;
      grid-column: 3;
      background: var(--panel-bg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #content-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      height: 44px;
      border-bottom: 1px solid var(--border);
    }
    .breadcrumb {
      color: var(--text);
      font-weight: 500;
      flex-shrink: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.82rem;
    }
	.file-date {
	  font-size:0.74rem;
	  color:var(--text-dim);
	  white-space:nowrap;
	  flex-shrink:0;
	  overflow: hidden;
	  text-overflow: ellipsis;
	  display:none;
	  margin-left:10px;
	  flex:1;
	}

    #img-toolbar { display: none; align-items: center; gap: 6px; flex-shrink: 0; }
    #img-toolbar.visible { display: flex; }

    .img-tb-btn {
      padding: 3px 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.76rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .img-tb-btn:hover  { background: var(--hover); border-color: var(--accent); color: var(--text-bright); }
    .img-tb-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--text-bright); }

    #content-body {
      flex: 1;
      overflow: auto;
      padding: 28px 36px;
    }
    #content-body::-webkit-scrollbar { width: 6px; }
    #content-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Welcome / splash ─────────────────────────────────────────── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 14px;
      text-align: center;
    }
    .welcome .big-icon { font-size: 3.5rem; }
    .welcome h2 { font-size: 1.1rem; color: var(--text); font-weight: 600; }
    .welcome p  { font-size: 0.85rem; max-width: 360px; line-height: 1.6; color: var(--text-dim); }

    .welcome button {
      margin-top: 8px;
      padding: 9px 24px;
      border-radius: var(--radius);
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
    }
    .welcome button:hover { background: var(--accent); color: #fff; }
    .welcome a { font-size: 0.8rem; color: var(--text-dim); text-decoration: none; }
    .welcome a:hover { color: var(--text); text-decoration: underline; }

    /* ── Plain-text display ───────────────────────────────────────── */
    #text-output {
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.875rem;
      line-height: 1.7;
      color: var(--text-bright);
      white-space: pre-wrap;
      word-break: break-word;
      tab-size: 4;
    }

    /* ── Image viewer ─────────────────────────────────────────────── */
    #img-output { display: flex; align-items: flex-start; justify-content: center; }

    #img-output img {
      display: block;
      border-radius: var(--radius);
      box-shadow: 0 4px 32px rgba(0,0,0,0.5);
    }
    #img-output img.zoom-fit-width  { width: 100%; height: auto; }
    #img-output img.zoom-fit-height { width: auto; height: calc(100vh - var(--header-h) - 44px - 56px - 20px); max-width: none; }
    #img-output img.zoom-full       { width: auto; height: auto; max-width: none; }

    #img-output object {
      display: block;
      border-radius: var(--radius);
      box-shadow: 0 4px 32px rgba(0,0,0,0.5);
      background: #fff;
    }
    #img-output object.zoom-fit-width  { width: 100%; min-height: 300px; }
    #img-output object.zoom-fit-height { width: auto; height: calc(100vh - var(--header-h) - 44px - 56px - 20px); min-width: 300px; }
    #img-output object.zoom-full       { width: auto; min-height: 200px; min-width: 200px; }

    .err-msg { color: var(--danger); padding: 20px; font-size: 0.88rem; }

    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Header ──────────────────────────────────────────────────── -->
  <header id="header">
    <div class="logo">📷 Snap<span>Viewer</span> <span id="logo-subhead">for testthat snapshots</span></div>
    <div id="path-dropdown-wrap">
      <button id="path-btn" title="Switch or open a _snaps folder">
        <span id="path-text" class="path-text">No folder open</span>
        <span class="chevron">▼</span>
      </button>
      <div id="path-dropdown"></div>
    </div>
  </header>

  <!-- ── Sidebar ─────────────────────────────────────────────────── -->
  <nav id="sidebar">
    <div id="sidebar-toolbar">
      <button class="tb-btn" id="btn-sort">
        <span class="btn-icon">↕</span>
        <span id="sort-label">A–Z</span>
      </button>
      <button class="tb-btn" id="btn-filter">
        <span class="btn-icon">🔍</span> Filter
      </button>
      <button class="tb-btn" id="btn-clear">
        <span class="btn-icon">✕</span> Clear
      </button>
    </div>
    <div id="filter-bar">
      <input id="filter-input" type="text" placeholder="Type to filter files…"
             autocomplete="off" spellcheck="false" />
    </div>
    <div id="tree-scroll">
      <div id="tree-root"></div>
    </div>
  </nav>

  <!-- ── Resize handle ───────────────────────────────────────────── -->
  <div id="resizer"></div>

  <!-- ── Content ─────────────────────────────────────────────────── -->
  <main id="content">
    <div id="content-header">
      <span id="breadcrumb-text" class="breadcrumb">Select a file to preview</span>
	  <span id="file-date-badge" class="file-date"></span>
      <div id="img-toolbar">
        <button class="img-tb-btn active" id="zoom-fit-width">Fit to width</button>
        <button class="img-tb-btn"        id="zoom-fit-height">Fit to height</button>
        <button class="img-tb-btn"        id="zoom-full">Full size</button>
      </div>
    </div>
    <div id="content-body"></div>
  </main>

</div>

<!-- ── Nickname modal ──────────────────────────────────────────────── -->
<div id="modal-overlay">
  <div id="modal">
    <h3>🏷 Name this folder</h3>
    <p>Give this <strong>_snaps</strong> folder a nickname so you can tell it apart from others in the history list.</p>
    <input id="modal-input" type="text" placeholder="e.g. Work, Personal, Project X…"
           autocomplete="off" spellcheck="false" maxlength="48" />
    <p class="modal-hint">You can rename it later by clicking the pencil icon in the folder list.</p>
    <div id="modal-actions">
      <button class="modal-btn" id="modal-skip">Skip</button>
      <button class="modal-btn primary" id="modal-save">Save nickname</button>
    </div>
  </div>
</div>

<!-- ── File tooltip ──────────────────────────────────────────────── -->
<div id="file-tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-row">
    <span class="tt-icon">📅</span>
    <span>Modified</span>
    <span class="tt-val" id="tt-date"></span>
  </div>
  <div class="tt-row">
    <span class="tt-icon">💾</span>
    <span>Size</span>
    <span class="tt-val" id="tt-size"></span>
  </div>
</div>

<script>
'use strict';

// ── IndexedDB ────────────────────────────────────────────────────────
// Store "handles": { id (auto), handle, label, lastOpened }
// Store "meta":    key "currentId" → id

const DB_NAME    = 'snap-viewer-testthat';
const DB_HANDLES = 'handles';
const DB_META    = 'meta';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(DB_HANDLES))
        db.createObjectStore(DB_HANDLES, { keyPath: 'id', autoIncrement: true });
      if (!db.objectStoreNames.contains(DB_META))
        db.createObjectStore(DB_META);
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

async function dbGetAll() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction(DB_HANDLES, 'readonly')
                  .objectStore(DB_HANDLES).getAll();
    req.onsuccess = e => {
      const rows = (e.target.result || []);
      rows.sort((a, b) => b.lastOpened - a.lastOpened);
      resolve(rows);
    };
    req.onerror = e => reject(e.target.error);
  });
}

async function dbPut(rec) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction(DB_HANDLES, 'readwrite')
                  .objectStore(DB_HANDLES).put(rec);
    req.onsuccess = e => resolve(e.target.result); // returns id
    req.onerror   = e => reject(e.target.error);
  });
}

async function dbDelete(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction(DB_HANDLES, 'readwrite')
                  .objectStore(DB_HANDLES).delete(id);
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  });
}

async function dbGetMeta(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction(DB_META, 'readonly')
                  .objectStore(DB_META).get(key);
    req.onsuccess = e => resolve(e.target.result ?? null);
    req.onerror   = e => reject(e.target.error);
  });
}

async function dbSetMeta(key, val) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction(DB_META, 'readwrite')
                  .objectStore(DB_META).put(val, key);
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  });
}

// Upsert: if same filesystem entry exists, update it; otherwise insert.
// Returns { id, isNew }
async function upsertHandle(handle, label) {
  const records = await dbGetAll();
  for (const rec of records) {
    let same = false;
    try { same = await rec.handle.isSameEntry(handle); } catch {}
    if (same) {
      rec.lastOpened = Date.now();
      if (label !== undefined) rec.label = label;
      await dbPut(rec);
      return { id: rec.id, isNew: false };
    }
  }
  const id = await dbPut({ handle, label: label ?? '', lastOpened: Date.now() });
  return { id, isNew: true };
}

// ── Constants & state ────────────────────────────────────────────────
const EXT_IMG   = new Set(['svg','png','jpg','jpeg','gif','webp','bmp','ico','avif','tiff']);
const EXT_MD    = new Set(['md','markdown']);
const SNAPS_DIR = '_snaps';

let rootHandle   = null;
let currentRecId = null;
let sortMode     = 'alpha';
let filterText   = '';
let activeRow    = null;

// ── Nickname modal ────────────────────────────────────────────────────
// Returns a Promise that resolves to the entered label (or '' if skipped).
function promptNickname(suggestedLabel) {
  return new Promise(resolve => {
    modalInput.value = suggestedLabel || '';
    modalOverlay.classList.add('open');
    modalInput.focus();
    modalInput.select();

    const finish = label => {
      modalOverlay.classList.remove('open');
      $('modal-save').removeEventListener('click', onSave);
      $('modal-skip').removeEventListener('click', onSkip);
      modalInput.removeEventListener('keydown', onKey);
      resolve(label);
    };

    const onSave = () => finish(modalInput.value.trim());
    const onSkip = () => finish('');
    const onKey  = e => {
      if (e.key === 'Enter')  { e.preventDefault(); finish(modalInput.value.trim()); }
      if (e.key === 'Escape') { e.preventDefault(); finish(''); }
    };

    $('modal-save').addEventListener('click', onSave);
    $('modal-skip').addEventListener('click', onSkip);
    modalInput.addEventListener('keydown', onKey);
  });
}

// ── Boot ──────────────────────────────────────────────────────────────
(async function boot() {
  const records = await dbGetAll();
  if (records.length === 0) { showSplash(); return; }
  showReturnSplash(records[0], records);
})();

// ── Splash screens ────────────────────────────────────────────────────
function showSplash() {
  contentBody.innerHTML = `
    <div class="welcome">
      <div class="big-icon">📁</div>
      <h2>Welcome to SnapViewer</h2>
      <p>Click below to open a <strong>_snaps</strong> folder.
         Your folders will be remembered for next time.</p>
      <button id="open-btn">Open _snaps folder</button>
    </div>`;
  $('open-btn').addEventListener('click', openSnaps);
  renderDropdown([], null);
}

function showReturnSplash(mostRecent, allRecords) {
  const display = displayName(mostRecent);
  contentBody.innerHTML = `
    <div class="welcome">
      <div class="big-icon">📁</div>
      <h2>Welcome back</h2>
      <p>Click below to reopen <strong>${escHtml(display)}</strong>,
         or use the folder menu in the title bar to switch folders.</p>
      <button id="open-btn">Open ${escHtml(display)}</button>
      <p style="margin-top:10px">
        <a id="pick-new" href="#">Open a different _snaps folder…</a>
      </p>
    </div>`;
  $('open-btn').addEventListener('click', () => activateRecord(mostRecent));
  $('pick-new').addEventListener('click', e => { e.preventDefault(); openSnaps(); });
  renderDropdown(allRecords, null);
}

function showReadySplash() {
  contentBody.innerHTML = `
    <div class="welcome">
      <div class="big-icon">📁</div>
      <h2>Folder loaded</h2>
      <p>Select any file from the tree on the left to preview it here.</p>
    </div>`;
}

// ── Display name helper ───────────────────────────────────────────────
// Shows the user-assigned label if set, otherwise the folder's system name.
function displayName(rec) {
  return (rec.label && rec.label.trim()) ? rec.label.trim() : rec.handle.name;
}

// ── Activate a stored record ──────────────────────────────────────────
async function activateRecord(rec) {
  try {
    const perm = await rec.handle.requestPermission({ mode: 'read' });
    if (perm !== 'granted') {
      showError('Permission denied. Please try again.');
      return;
    }
  } catch {
    showError('This folder is no longer accessible. Please open it again via "Open a different _snaps folder".');
    return;
  }
  rec.lastOpened = Date.now();
  await dbPut(rec);
  await dbSetMeta('currentId', rec.id);
  currentRecId = rec.id;
  await loadRoot(rec.handle, rec);
}

// ── Open folder picker ────────────────────────────────────────────────
async function openSnaps() {
  try {
    const records = await dbGetAll();
    const startIn = records.length > 0 ? records[0].handle : 'documents';
    const parent  = await window.showDirectoryPicker({ mode: 'read', startIn });

    let handle;
    try { handle = await parent.getDirectoryHandle(SNAPS_DIR); }
    catch { handle = parent.name === SNAPS_DIR ? parent : null; }

    if (!handle) {
      showError(`"${SNAPS_DIR}" not found inside "${escHtml(parent.name)}". Please pick a folder that contains _snaps.`);
      return;
    }

    // Check if this is a new entry or existing
    const { id, isNew } = await upsertHandle(handle);

    // Fetch the record we just upserted
    const allRecs = await dbGetAll();
    const rec     = allRecs.find(r => r.id === id);

    // Prompt for a nickname only on first-ever open of this folder
    if (isNew) {
      const label = await promptNickname('');
      rec.label   = label;
      await dbPut(rec);
    }

    await dbSetMeta('currentId', id);
    currentRecId = id;
    await loadRoot(handle, rec);

  } catch (e) {
    if (e.name !== 'AbortError') showError('Error: ' + e.message);
  }
}

// ── Load root ─────────────────────────────────────────────────────────
async function loadRoot(handle, rec) {
  rootHandle = handle;
  openPaths  = new Set();        // ← reset expand state for new folder
  pathText.textContent = displayName(rec);
  pathText.classList.add('has-path');
  const records = await dbGetAll();
  renderDropdown(records, currentRecId);
  await rebuildTree();
  showReadySplash();
}

// ── Path button & dropdown ────────────────────────────────────────────
pathBtn.addEventListener('click', async e => {
  e.stopPropagation();
  const isOpen = pathDropdown.classList.toggle('open');
  pathBtn.classList.toggle('open', isOpen);
  if (isOpen) {
    const records = await dbGetAll();
    renderDropdown(records, currentRecId);
  }
});

document.addEventListener('click', e => {
  if (!$('path-dropdown-wrap').contains(e.target)) {
    pathDropdown.classList.remove('open');
    pathBtn.classList.remove('open');
  }
});

function renderDropdown(records, activeId) {
  pathDropdown.innerHTML = '';

  if (records.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:14px;font-size:0.82rem;color:var(--text-dim)';
    empty.textContent = 'No folders in history yet.';
    pathDropdown.appendChild(empty);
  } else {
    const sectionLabel = document.createElement('div');
    sectionLabel.className = 'dd-section-label';
    sectionLabel.textContent = 'Recent Folders';
    pathDropdown.appendChild(sectionLabel);

    for (const rec of records) {
      pathDropdown.appendChild(makeDropdownItem(rec, activeId));
    }
  }

  // Always show "Open a different folder" at the bottom
  const divider = document.createElement('div');
  divider.className = 'dd-divider';
  pathDropdown.appendChild(divider);

  const action = document.createElement('div');
  action.className = 'dd-action';
  action.innerHTML = '<span>📁</span> Open a different _snaps folder…';
  action.addEventListener('click', () => {
    pathDropdown.classList.remove('open');
    pathBtn.classList.remove('open');
    openSnaps();
  });
  pathDropdown.appendChild(action);
}

function makeDropdownItem(rec, activeId) {
  const isCurrent = rec.id === activeId;
  const item = document.createElement('div');
  item.className = 'dd-item' + (isCurrent ? ' current' : '');

  // ── Left: label + meta ──────────────────────────────────────────
  const body = document.createElement('div');
  body.className = 'dd-item-body';

  // Label row (default view)
  const labelRow = document.createElement('div');
  labelRow.className = 'dd-item-label';

  const labelText = document.createElement('span');
  labelText.textContent = displayName(rec);

  if (isCurrent) {
    const badge = document.createElement('span');
    badge.className = 'dd-current-badge';
    badge.textContent = 'open';
    labelRow.appendChild(labelText);
    labelRow.appendChild(badge);
  } else {
    labelRow.appendChild(labelText);
  }

  const metaRow = document.createElement('div');
  metaRow.className = 'dd-item-meta';
  metaRow.textContent = (rec.label && rec.label.trim())
    ? `Last viewed: ${formatDate(rec.lastOpened)}`
    : formatDate(rec.lastOpened);

  body.appendChild(labelRow);
  body.appendChild(metaRow);

  // Clicking the body (not buttons) switches to this folder
  body.addEventListener('click', async () => {
    if (isCurrent) { pathDropdown.classList.remove('open'); pathBtn.classList.remove('open'); return; }
    pathDropdown.classList.remove('open');
    pathBtn.classList.remove('open');
    await activateRecord(rec);
  });

  // ── Right: action buttons ────────────────────────────────────────
  const actions = document.createElement('div');
  actions.className = 'dd-item-actions';

  // Rename button
  const renameBtn = document.createElement('button');
  renameBtn.className = 'dd-icon-btn';
  renameBtn.title = 'Rename';
  renameBtn.innerHTML = '✎'; // pencil

  renameBtn.addEventListener('click', async e => {
    e.stopPropagation();
    // Swap label text for an inline input
    const input = document.createElement('input');
    input.className = 'dd-label-input';
    input.value = rec.label || '';
    input.placeholder = rec.handle.name;
    input.maxLength = 48;

    labelRow.replaceWith(input);
    input.focus();
    input.select();

    const confirmBtn = document.createElement('button');
    confirmBtn.className = 'dd-icon-btn confirm';
    confirmBtn.title = 'Save';
    confirmBtn.innerHTML = '✓';

    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'dd-icon-btn';
    cancelBtn.title = 'Cancel';
    cancelBtn.innerHTML = '✕';

    // Temporarily replace rename/delete with confirm/cancel
    actions.innerHTML = '';
    actions.appendChild(confirmBtn);
    actions.appendChild(cancelBtn);

    const commit = async () => {
      rec.label = input.value.trim();
      await dbPut(rec);
      // If this is the currently open folder, update the header
      if (rec.id === currentRecId) {
        pathText.textContent = displayName(rec);
      }
      const updated = await dbGetAll();
      renderDropdown(updated, currentRecId);
    };

    const cancel = async () => {
      const updated = await dbGetAll();
      renderDropdown(updated, currentRecId);
    };

    confirmBtn.addEventListener('click', e => { e.stopPropagation(); commit(); });
    cancelBtn.addEventListener('click',  e => { e.stopPropagation(); cancel(); });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); commit(); }
      if (e.key === 'Escape') { e.preventDefault(); cancel(); }
    });
  });

  // Delete button
  const deleteBtn = document.createElement('button');
  deleteBtn.className = 'dd-icon-btn danger';
  deleteBtn.title = 'Remove from history';
  deleteBtn.innerHTML = '✕';

  deleteBtn.addEventListener('click', async e => {
    e.stopPropagation();
    await dbDelete(rec.id);
    if (rec.id === currentRecId) {
      currentRecId = null;
      rootHandle   = null;
      pathText.textContent = 'No folder open';
      pathText.classList.remove('has-path');
      treeRoot.innerHTML = '';
    }
    const updated = await dbGetAll();
    renderDropdown(updated, currentRecId);
    if (updated.length === 0) {
      pathDropdown.classList.remove('open');
      pathBtn.classList.remove('open');
      showSplash();
    }
  });

  actions.appendChild(renameBtn);
  actions.appendChild(deleteBtn);

  item.appendChild(body);
  item.appendChild(actions);
  return item;
}

// ── Helpers ───────────────────────────────────────────────────────────
function formatDate(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleDateString(undefined, {
    month: 'short', day: 'numeric', year: 'numeric'
  }) + ' ' + new Date(ts).toLocaleTimeString(undefined, {
    hour: '2-digit', minute: '2-digit'
  });
}

function showError(msg) {
  contentBody.innerHTML = `<div class="err-msg">${escHtml(msg)}</div>`;
}

// ── Sort ──────────────────────────────────────────────────────────────
sortBtn.addEventListener('click', () => {

  sortLabel.textContent = sortMode === 'alpha' ? 'A–Z' : 'Recent';
  sortBtn.classList.toggle('active', sortMode === 'time');

// ── Filter ────────────────────────────────────────────────────────────

clearBtn.addEventListener('click', () => {

// ── Resize ────────────────────────────────────────────────────────────
(function initResizer() {
  const resizer = $('resizer');
  let dragging = false, startX = 0, startWidth = 0;
  resizer.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX;
    startWidth = parseInt(getComputedStyle(appEl).gridTemplateColumns.split(' ')[0], 10);
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const w = Math.max(160, Math.min(window.innerWidth * 0.75, startWidth + e.clientX - startX));
    appEl.style.gridTemplateColumns = `${w}px 4px 1fr`;
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// ── Zoom ──────────────────────────────────────────────────────────────
['zoom-fit-width','zoom-fit-height','zoom-full'].forEach(id => {
  $(id).addEventListener('click', () => {
    currentZoom = id; updateZoomButtons(); applyZoom();
  });
});

function updateZoomButtons() {
  ['zoom-fit-width','zoom-fit-height','zoom-full'].forEach(id =>
    $(id).classList.toggle('active', id === currentZoom));
}

function applyZoom() {
  const el = contentBody.querySelector('#img-output img, #img-output object');
  if (!el) return;
  el.classList.remove('zoom-fit-width','zoom-fit-height','zoom-full');
  el.classList.add(currentZoom);
}

// ── Tree ──────────────────────────────────────────────────────────────
let treeGeneration = 0;
let openPaths      = new Set();   // source of truth for expand state

async function rebuildTree() {
  if (!rootHandle) return;
  const gen = ++treeGeneration;
  treeRoot.innerHTML = '';
  await buildTree(rootHandle, treeRoot, 0, gen, '', openPaths);
}

async function buildTree(dirHandle, container, depth, gen, pathPrefix, openPaths) {
  const entries = [];
  for await (const entry of dirHandle.values()) entries.push(entry);

  if (sortMode === 'alpha') {
    entries.sort((a, b) => {
      if (a.kind !== b.kind) return a.kind === 'directory' ? -1 : 1;
      return a.name.localeCompare(b.name, undefined, { sensitivity: 'base' });
    });
  } else {
    const withTime = await Promise.all(entries.map(async e => {
      let t = 0;
      if (e.kind === 'file') { try { t = (await e.getFile()).lastModified; } catch {} }
      return { entry: e, t };
    }));
    withTime.sort((a, b) => {
      if (a.entry.kind !== b.entry.kind) return a.entry.kind === 'directory' ? -1 : 1;
      return b.t - a.t;
    });
    entries.length = 0;
    withTime.forEach(w => entries.push(w.entry));
  }

  for (const entry of entries) {
    const node   = document.createElement('div');
    node.className = 'tree-node';
    const row    = document.createElement('div');
    row.className = 'tree-row';
    row.style.paddingLeft = (depth * 16 + 10) + 'px';
    const entryPath = pathPrefix ? pathPrefix + '/' + entry.name : entry.name;
    row.dataset.path = entryPath;
    const arrow  = document.createElement('span');
    arrow.className = 'row-arrow';
    arrow.innerHTML = '▶';
    const icon   = document.createElement('span');
    icon.className = 'row-icon';
    const nameEl = document.createElement('span');
    nameEl.className = 'row-name';
    nameEl.textContent = entry.name;
    row.appendChild(arrow); row.appendChild(icon); row.appendChild(nameEl);

    if (entry.kind === 'directory') {
      icon.innerHTML = '📁';
      icon.style.color = 'var(--folder)';
      if (filterText) {
        if (!(await folderHasMatch(entry))) continue;
        if (!entry.name.toLowerCase().includes(filterText)) row.classList.add('dim-folder');
      }
      const children = document.createElement('div');
      const shouldBeOpen = openPaths && openPaths.has(entryPath);
      children.className = 'tree-children' + (shouldBeOpen ? '' : ' collapsed');
      children.style.maxHeight = shouldBeOpen ? 'none' : '0px';
      let loaded = false;

      // If this folder was open before the rebuild, re-populate it immediately
      if (shouldBeOpen) {
        arrow.classList.add('open');
        await buildTree(entry, children, depth + 1, gen, entryPath, openPaths);
        loaded = true;
        if (gen !== treeGeneration) return;
      }

      row.addEventListener('click', async () => {
        const isOpen = arrow.classList.contains('open');
        if (!loaded) { await buildTree(entry, children, depth + 1, gen, entryPath, openPaths); loaded = true; }
        if (isOpen) {
          openPaths.delete(entryPath);          // ← persist collapse
          arrow.classList.remove('open');
          children.style.maxHeight = children.scrollHeight + 'px';
          requestAnimationFrame(() => requestAnimationFrame(() => {
            children.classList.add('collapsed');
            children.style.maxHeight = '0px';
          }));
        } else {
          openPaths.add(entryPath);             // ← persist expand
          children.classList.remove('collapsed');
          children.style.maxHeight = children.scrollHeight + 'px';
          arrow.classList.add('open');
          children.addEventListener('transitionend', () => {
            if (arrow.classList.contains('open')) children.style.maxHeight = 'none';
          }, { once: true });
        }
      });
	  
      node.appendChild(row);
      node.appendChild(children);
    } else {
      arrow.classList.add('leaf');
      const fi = fileIcon(entry.name);
      icon.innerHTML = fi.icon;
      icon.style.color = fi.color;
      if (filterText && !entry.name.toLowerCase().includes(filterText)) continue;
      row.addEventListener('click',      () => { setActiveRow(row); previewFile(entry); });
      row.addEventListener('mouseenter', e  => showTooltip(e, entry));
      row.addEventListener('mouseleave', () => hideTooltip());
      node.appendChild(row);
    }
    if (gen !== treeGeneration) return;
    container.appendChild(node);
  }
}

async function folderHasMatch(dirHandle) {
  for await (const entry of dirHandle.values()) {
    if (entry.kind === 'file') { if (entry.name.toLowerCase().includes(filterText)) return true; }
    else { if (await folderHasMatch(entry)) return true; }
  }
  return false;
}

function setActiveRow(row) {
  if (activeRow) activeRow.classList.remove('active');
  activeRow = row;
  row.classList.add('active');
}

// ── File preview ──────────────────────────────────────────────────────
async function previewFile(fileHandle) {
  breadcrumb.textContent = fileHandle.name;
  imgToolbar.classList.remove('visible');
  
  // Reset date badge until file metadata loads
  const dateBadge = $('file-date-badge');
  dateBadge.style.display = 'none';
  dateBadge.textContent   = '';
  
  if (currentMedia?.objectUrl) { URL.revokeObjectURL(currentMedia.objectUrl); currentMedia = null; }
  contentBody.innerHTML = '<div style="color:var(--text-dim);padding:40px 0;text-align:center;font-size:0.85rem">Loading…</div>';
  const ext = extOf(fileHandle.name);
  try {
    const file = await fileHandle.getFile();

    // Show modification date in the toolbar
    dateBadge.textContent   = 'Modified ' + formatDate(file.lastModified);
    dateBadge.style.display = 'block';

    if (EXT_MD.has(ext)) {
      const pre = document.createElement('div');
      pre.id = 'text-output';
      pre.textContent = await file.text();
      contentBody.innerHTML = '';
      contentBody.appendChild(pre);
    } else if (EXT_IMG.has(ext)) {
      const url = URL.createObjectURL(file);
      currentMedia = { objectUrl: url };
      contentBody.innerHTML = '<div id="img-output"></div>';
      imgToolbar.classList.add('visible');
      updateZoomButtons();
      if (ext === 'svg') {
        const obj = document.createElement('object');
        obj.type = 'image/svg+xml'; obj.data = url; obj.className = currentZoom;
        $('img-output').appendChild(obj);
      } else {
        const img = document.createElement('img');
        img.src = url; img.alt = fileHandle.name; img.className = currentZoom;
        $('img-output').appendChild(img);
      }
    } else {
      const pre = document.createElement('div');
      pre.id = 'text-output';
      pre.textContent = await file.text();
      contentBody.innerHTML = '';
      contentBody.appendChild(pre);
    }
  } catch (e) {
    contentBody.innerHTML = `<div class="err-msg">Error loading file: ${escHtml(e.message)}</div>`;
  }
}

// ── File tooltip ──────────────────────────────────────────────────────
const tooltip   = $('file-tooltip');
const ttName    = $('tt-name');
const ttDate    = $('tt-date');
const ttSize    = $('tt-size');
let   ttHideTimer = null;

async function showTooltip(e, fileHandle) {
  clearTimeout(ttHideTimer);
  try {
    const file  = await fileHandle.getFile();
    ttName.textContent = fileHandle.name;
    ttDate.textContent = formatDate(file.lastModified);
    ttSize.textContent = formatBytes(file.size);
  } catch {
    ttName.textContent = fileHandle.name;
    ttDate.textContent = '—';
    ttSize.textContent = '—';
  }
  positionTooltip(e);
  tooltip.classList.add('visible');
}

function positionTooltip(e) {
  const pad = 14;
  const tw  = tooltip.offsetWidth  || 260;
  const th  = tooltip.offsetHeight || 80;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  if (x + tw > window.innerWidth  - 8) x = e.clientX - tw - pad;
  if (y + th > window.innerHeight - 8) y = e.clientY - th - pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

function hideTooltip() {
  ttHideTimer = setTimeout(() => tooltip.classList.remove('visible'), 80);
}

// Keep tooltip tracking the cursor while hovering
document.addEventListener('mousemove', e => {
  if (tooltip.classList.contains('visible')) positionTooltip(e);
});

// ── Utility ───────────────────────────────────────────────────────────
function extOf(name) {
  const i = name.lastIndexOf('.');
  return i >= 0 ? name.slice(i + 1).toLowerCase() : '';
}
function fileIcon(name) {
  const e = extOf(name);
  if (EXT_MD.has(e))  return { icon: '📄', color: 'var(--file-md)' };
  if (EXT_IMG.has(e)) return { icon: '🖼️', color: 'var(--file-img)' };
  return { icon: '📄', color: 'var(--text-dim)' };
}
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function formatBytes(bytes) {
  if (bytes === 0) return '0 B';
  const units = ['B','KB','MB','GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(i === 0 ? 0 : 1) + ' ' + units[i];
}

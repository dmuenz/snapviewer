name: Deploy PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-preview:
    name: Deploy PR Preview to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: preview-pr-${{ github.event.number }}
      url: https://dmuenz.github.io/snapviewer/pr-preview/${{ github.event.number }}/

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment PR with preview link
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const previewUrl = `https://dmuenz.github.io/snapviewer/pr-preview/${prNumber}/`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Preview deployed! View the changes here:\n\n🔗 [Preview Link](${previewUrl})\n\n**Testing checklist:**\n- [ ] Test in Chrome/Edge (persistent history)\n- [ ] Test in Firefox/Safari (session-only)\n- [ ] Verify folder browsing and preview\n- [ ] Check visual indicators for temporary folders\n- [ ] Test page reload behavior`
            });
